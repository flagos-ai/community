# =============================================================================
# FlagOS 2.1 RC2 — 源码仓库清单（vcstool 格式）
# =============================================================================
# 用途：批量拉取所有模块的 rc2 已验证快照
# 用法：
#   pip install vcstool
#   mkdir flagos-2.1-rc2 && cd flagos-2.1-rc2
#   vcs import src < release-2.1-rc2.yaml
#
# version / 分支 / tag 关系：
#   - version 字段指向当前已验证的 tag（其他用户拉取锁定版本）
#   - 注释中的"分支"是开发集成线，修复在上面累积
#   - 每次验证通过后打递增 tag（rc2.post1 → rc2.post2 → ...），并更新 version
#
#   工作流：
#     git checkout -b v0.13.0-rc2          # 拉 rc2 分支（一次）
#     git push origin v0.13.0-rc2
#     ... 修复 ...
#     git tag v0.13.0-rc2.post1            # 第一轮验证
#     git push origin v0.13.0-rc2.post1
#     # manifest: version: v0.13.0-rc2.post1  ← 更新
#     ... 修复 ...
#     git tag v0.13.0-rc2.post2            # 第二轮验证
#     # manifest: version: v0.13.0-rc2.post2  ← 更新
#
# 分支命名规则：
#   - 每个模块使用自己的版本号 + 命名规则，详见 RC2_BRANCH_PLAN.md
#   - A 类（有 release/ 分支习惯的）: release/v{X}.{Y}.{Z}-rc2
#   - B 类（有 semver tag 但无 release 分支）: v{M}.{m}.{P}-rc2
#   - C 类（无 tag 的新模块）: v0.1.0-rc2
#   - D 类（非 pip / 无版本号）: 跟 FlagOS 版本或 FL 版本
#
# Tag 命名规则：
#   - 在分支名后追加 .postN，例如 v0.13.0-rc2 → v0.13.0-rc2.post1
#   - FlagGems 例外：tag 用 v5.0.5.rc2.post1 格式（但 branch 用 -rc2）
#
# ⚠️ 注意: FlagGems / FlagDNN / FlagBLAS 的默认分支是 master，其他模块都是 main。
# =============================================================================

repositories:

